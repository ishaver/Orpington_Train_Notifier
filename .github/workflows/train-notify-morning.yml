name: Southeastern Orpington -> London Bridge notifier

on:
  schedule:
    # Runs every 10 minutes, 05:00-10:59 UTC, Mon-Fri.
    # This window covers 06:00-10:00 local time in both BST and GMT;
    # the script itself double-checks local time and stays quiet outside it.
    - cron: "*/10 5-10 * * 1-5"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

jobs:
  check-trains:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Get today's date (UK time) for cache key
        id: date
        run: echo "date=$(TZ='Europe/London' date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Restore notification state
        uses: actions/cache@v4
        with:
          path: state-morning.json
          key: train-state-morning-${{ steps.date.outputs.date }}
          restore-keys: |
            train-state-morning-

      - name: Check trains and notify
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          FROM_CRS: ORP
          TO_CRS: LBG
          FROM_NAME: Orpington
          TO_NAME: London Bridge
          START_TIME: "05:00"
          CUTOFF_TIME: "10:00"
          STATE_FILE: state-morning.json
        run: python check_trains.py
