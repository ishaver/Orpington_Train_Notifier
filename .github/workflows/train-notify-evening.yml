name: Southeastern Charing Cross -> Orpington notifier

on:
  schedule:
    # Runs every 10 minutes, 16:00-19:59 UTC, Mon-Fri.
    # This window covers 17:00-19:00 local time in both BST and GMT;
    # the script itself double-checks local time and stays quiet outside it.
    - cron: "*/10 16-19 * * 1-5"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

jobs:
  check-trains:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Get today's date (UK time) for cache key
        id: date
        run: echo "date=$(TZ='Europe/London' date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Restore notification state
        uses: actions/cache@v4
        with:
          path: state-evening.json
          key: train-state-evening-${{ steps.date.outputs.date }}
          restore-keys: |
            train-state-evening-

      - name: Check trains and notify
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          FROM_CRS: CHX
          TO_CRS: ORP
          FROM_NAME: Charing Cross
          TO_NAME: Orpington
          START_HOUR: "17"
          CUTOFF_HOUR: "19"
          STATE_FILE: state-evening.json
        run: python check_trains.py
